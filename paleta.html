<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paleta de colores</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Header dinámico -->
    <div id="header"></div>

    <main class="site-main">
      <section class="card palette-card">
        <h2>Paleta de colores</h2>

        <p class="palette-description">
          Esta es la paleta de colores elegida para el sitio. Se utilizan
          distintas tonalidades de azul para lograr una estética moderna y
          coherente.
        </p>

        <!-- Widget Coolors -->
        <div class="coolors-widget-container">
          <script src="https://coolors.co/palette-widget/widget.js"></script>
          <script data-id="014020332971647875">
            new CoolorsPaletteWidget("014020332971647875", [
              "00072d",
              "001c55",
              "0a2472",
              "0e6ba8",
              "a6e1fa"
            ]);
          </script>
        </div>
      </section>
    </main>

    <!-- Footer dinámico -->
    <div id="footer"></div>

    <!-- Script principal -->
    <script src="js/main.js"></script>
  </body>
</html>
